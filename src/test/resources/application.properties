# Test-only config: use an isolated in-memory H2 so tests never touch the
# dev file database (./data/bankdb) and start from a clean schema each run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
# Enabled so PathRequest.toH2Console() in SecurityConfig can resolve the
# H2ConsoleProperties bean when the security filter chain is built.
spring.h2.console.enabled=true
