spring.application.name=myfirstwebapp

# --- Database: file-based H2 (see docs/adr/0001-use-file-based-h2-database.md) ---
spring.datasource.url=jdbc:h2:file:./data/bankdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
